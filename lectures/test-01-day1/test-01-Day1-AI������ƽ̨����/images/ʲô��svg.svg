  <circle cx="480" cy="90" r="50" fill="#4A90D9"/>
  <text x="480" y="97" fill="#fff" font-size="20" text-anchor="middle" font-weight="bold">Hello</text>
  <text x="510" y="165" fill="#50C878" font-size="12" text-anchor="middle">浏览器直接渲染 SVG 代码</text>
