<svg viewBox="0 0 680 180" xmlns="http://www.w3.org/2000/svg">
  <rect width="680" height="180" rx="12" fill="#1a1a2e"/>
  <text x="170" y="25" fill="#888" font-size="13" text-anchor="middle">SVG 代码</text>
  <text x="510" y="25" fill="#888" font-size="13" text-anchor="middle">渲染效果</text>
  <line x1="340" y1="10" x2="340" y2="170" stroke="#444" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Code side -->
  <text x="20" y="50" fill="#4A90D9" font-size="12" font-family="monospace">&lt;svg&gt;</text>
  <text x="30" y="68" fill="#7B68EE" font-size="12" font-family="monospace">&lt;circle cx="100" cy="100"</text>
  <text x="45" y="84" fill="#7B68EE" font-size="12" font-family="monospace">r="60" fill="#4A90D9" /&gt;</text>
  <text x="30" y="104" fill="#50C878" font-size="12" font-family="monospace">&lt;text&gt;Hello&lt;/text&gt;</text>
  <text x="20" y="124" fill="#4A90D9" font-size="12" font-family="monospace">&lt;/svg&gt;</text>
  <!-- Arrow -->
  <text x="345" y="100" fill="#FFD93D" font-size="20">→</text>
